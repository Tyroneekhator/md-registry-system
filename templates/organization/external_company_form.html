{% extends "base/base.html" %}
{% load static %}

{% block title %}Edit External Company{% endblock %}

{% block content %}
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h5 mb-1">Edit External Company</h1>
            <p class="text-muted small mb-0">
                Update company name and description.
            </p>
        </div>

        <a href="{% url 'organization:external_company_detail' company.ExternalCompanyNameID %}"
           class="btn btn-outline-secondary btn-sm">
            Back to Detail
        </a>
    </div>

    <div class="bg-white border rounded p-4">
        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label small">Company Name</label>
                <input type="text"
                       name="company_name"
                       class="form-control form-control-sm"
                       value="{{ company.CompanyName }}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label small">Description</label>
                <textarea name="description"
                          class="form-control form-control-sm"
                          rows="4">{{ company.Description|default:'' }}</textarea>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <a href="{% url 'organization:external_company_detail' company.ExternalCompanyNameID %}"
                    class="btn btn-outline-secondary btn-sm">
                    Cancel
                </a>
                <button type="submit" class="btn btn-primary btn-sm">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
