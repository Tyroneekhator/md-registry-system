{# ====================================================== #}
{# Global Django Messages Display                         #}
{# This template is included inside base.html             #}
{# ====================================================== #}

{% if messages %}

    <!-- Wrapper spacing -->
    <div class="mb-3">

        {% for message in messages %}

            <!-- 
                Bootstrap alert types:
                success, error, warning, info
            -->
            <div class="alert alert-{{ message.tags|default:'info' }} 
                        alert-dismissible fade show small"
                 role="alert">

                <!-- Message Text -->
                {{ message }}

                <!-- Close Button -->
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="alert"
                        aria-label="Close">
                </button>

            </div>

        {% endfor %}

    </div>

{% endif %}
